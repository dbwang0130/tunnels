name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # 允许在 Actions 页手动触发，仅构建、不发 release

permissions:
  contents: write          # 创建 release / 上传资产所需

jobs:
  build:
    # 项目部署目标是 macOS 26.4，需匹配 SDK 的 runner
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i macos || true

      - name: Build (ad-hoc signed archive)
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Tunnels.xcodeproj \
            -scheme Tunnels \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/Tunnels.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package DMG
        id: dmg
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          APP="build/Tunnels.xcarchive/Products/Applications/Tunnels.app"
          test -d "$APP"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          DMG="Tunnels-${VERSION}.dmg"
          hdiutil create -volname "Tunnels" -srcfolder "$STAGING" \
            -fs HFS+ -ov -format UDZO "$DMG"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.dmg.outputs.dmg }}
          path: ${{ steps.dmg.outputs.dmg }}
          if-no-files-found: error

      - name: Publish release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.dmg }}"
          # release 已存在则覆盖资产，否则新建
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Tunnels $GITHUB_REF_NAME" \
              --generate-notes \
              "$DMG"
          fi
